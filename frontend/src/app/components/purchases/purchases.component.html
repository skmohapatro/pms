<div class="container">
  <div class="header-row">
    <h2 class="page-title">Purchase Date Wise</h2>
    <div class="action-buttons">
      <button mat-raised-button color="accent" (click)="syncAllTables()" [disabled]="syncing">
        <mat-icon>{{ syncing ? 'hourglass_empty' : 'sync' }}</mat-icon>
        {{ syncing ? 'Syncing...' : 'Sync Tables' }}
      </button>
      <button mat-raised-button color="warn" (click)="openDeleteDialog()">
        <mat-icon>delete_sweep</mat-icon> Delete Data
      </button>
      <button mat-raised-button color="primary" (click)="openCreateDialog()">
        <mat-icon>add</mat-icon> Add Transaction
      </button>
    </div>
  </div>

  <mat-form-field appearance="outline" class="filter-field">
    <mat-label>Search</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Filter by company, date...">
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div class="table-container mat-elevation-z2">
    <table mat-table [dataSource]="dataSource" matSort>

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> # </th>
        <td mat-cell *matCellDef="let row"> {{ row.id }} </td>
      </ng-container>

      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Date </th>
        <td mat-cell *matCellDef="let row"> {{ row.date }} </td>
      </ng-container>

      <ng-container matColumnDef="company">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Company </th>
        <td mat-cell *matCellDef="let row"> {{ row.company }} </td>
      </ng-container>

      <ng-container matColumnDef="quantity">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Quantity </th>
        <td mat-cell *matCellDef="let row"> {{ row.quantity }} </td>
      </ng-container>

      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Price </th>
        <td mat-cell *matCellDef="let row"> {{ row.price | number:'1.2-2' }} </td>
      </ng-container>

      <ng-container matColumnDef="investment">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Investment </th>
        <td mat-cell *matCellDef="let row"> {{ row.investment | number:'1.2-2' }} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" (click)="openEditDialog(row)" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deletePurchase(row.id)" matTooltip="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="7" style="text-align: center; padding: 20px;">
          No data available. Upload an Excel file first.
        </td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[10, 25, 50, 100]" showFirstLastButtons></mat-paginator>
  </div>
</div>
